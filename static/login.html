<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DrillPilot — Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    background:#0a0e12;
    font-family:'Segoe UI', sans-serif;
  }
  .login-card{
    background:#11171d;
    border:1px solid #212b33;
    border-radius:12px;
    padding:36px 32px;
    max-width:380px;
    width:100%;
    margin:auto;
  }
  .login-card h1{
    color:#e6edf1;
    font-size:20px;
    font-weight:700;
    margin-bottom:4px;
  }
  .login-card p.sub{
    color:#7c8b96;
    font-size:13px;
    margin-bottom:24px;
  }
  .form-label{color:#c7d0d5; font-size:13px;}
  .form-control{
    background:#161d24;
    border:1px solid #212b33;
    color:#e6edf1;
  }
  .form-control:focus{
    background:#161d24;
    color:#e6edf1;
    border-color:#2dd4bf;
    box-shadow:0 0 0 .2rem rgba(45,212,191,.25);
  }
  .btn-login{
    background:#2dd4bf;
    border:none;
    color:#00201c;
    font-weight:600;
  }
  .btn-login:hover{ background:#26bfac; color:#00201c; }
  #errorMsg{ display:none; font-size:13px; }
</style>
</head>
<body>

<div class="login-card">
  <h1>DrillPilot</h1>
  <p class="sub">DR Drill Orchestrator — sign in to continue</p>

  <form id="loginForm" novalidate>
    <div class="mb-3">
      <label class="form-label" for="username">Username</label>
      <input type="text" class="form-control" id="username" placeholder="Enter username" required>
    </div>
    <div class="mb-3">
      <label class="form-label" for="password">Password</label>
      <input type="password" class="form-control" id="password" placeholder="Enter password" required>
    </div>

    <div class="alert alert-danger py-2" id="errorMsg">Invalid username or password.</div>

    <button type="submit" class="btn btn-login w-100 mt-2">Sign in</button>
  </form>
</div>

<script>
  // ---- Static credentials (frontend-only, no backend) ----
  // Change these two values to whatever you want the login to be.
  const VALID_USERNAME = "admin";
  const VALID_PASSWORD = "drillpilot123";

  // Page to redirect to after a successful login.
  const REDIRECT_TO = "/static/index.html";

  const form = document.getElementById('loginForm');
  const errorMsg = document.getElementById('errorMsg');

  form.addEventListener('submit', function(e){
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if(username === VALID_USERNAME && password === VALID_PASSWORD){
      sessionStorage.setItem("authenticated","true");
      window.location.href = REDIRECT_TO;
    } else {
      errorMsg.style.display = 'block';
    }
  });
</script>

</body>
</html>
